name: build-windows-release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pypdf pyinstaller
      - name: Install Inno Setup
        shell: powershell
        run: |
          winget install --id JRSoftware.InnoSetup -e --accept-source-agreements --accept-package-agreements --disable-interactivity
      - name: Build executable
        shell: powershell
        run: .\scripts\build_windows.ps1 -Version $env:GITHUB_REF_NAME.TrimStart("v")
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Literature-management-tool-*-Setup.exe
