<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Literature Management Tool banner</title>
  <desc id="desc">A blue banner with a logo mark and feature labels for the Literature Management Tool project.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="48" x2="1478" y2="488" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1F35"/>
      <stop offset="0.55" stop-color="#123E70"/>
      <stop offset="1" stop-color="#0C6BA6"/>
    </linearGradient>
    <linearGradient id="accent" x1="292" y1="118" x2="480" y2="306" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5DD4FF"/>
      <stop offset="1" stop-color="#1F8F6A"/>
    </linearGradient>
    <linearGradient id="warm" x1="1154" y1="282" x2="1368" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD37A"/>
      <stop offset="1" stop-color="#FF9E57"/>
    </linearGradient>
  </defs>

  <rect x="24" y="24" width="1552" height="472" rx="34" fill="url(#bg)"/>
