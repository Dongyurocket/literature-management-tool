  <text x="886" y="374" fill="#F8FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">File workflow</text>
  <text x="886" y="408" fill="#D8E8F9" font-family="Segoe UI, Arial, sans-serif" font-size="18">copy / move / link</text>
  <text x="886" y="434" fill="#D8E8F9" font-family="Segoe UI, Arial, sans-serif" font-size="18">PDF, notes, OCR, repair</text>

  <rect x="1092" y="330" width="274" height="110" rx="26" fill="#0E2745" fill-opacity="0.42" stroke="url(#warm)" stroke-opacity="0.55"/>
