  <text x="118" y="346" fill="#B9D8F5" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="2">LOCAL-FIRST DESKTOP</text>
  <text x="118" y="382" fill="#D7E8FA" font-family="Segoe UI, Arial, sans-serif" font-size="18">Metadata, notes, OCR and export</text>

