  <rect x="580" y="330" width="244" height="110" rx="26" fill="#F7FBFF" fill-opacity="0.10" stroke="#F7FBFF" stroke-opacity="0.15"/>
  <text x="614" y="374" fill="#F8FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Multi-source metadata</text>
  <text x="614" y="408" fill="#D8E8F9" font-family="Segoe UI, Arial, sans-serif" font-size="18">Crossref, DataCite, OpenAlex,</text>
  <text x="614" y="434" fill="#D8E8F9" font-family="Segoe UI, Arial, sans-serif" font-size="18">CNKI, OpenURL, OpenLibrary</text>

